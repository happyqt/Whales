<head>
    <meta charset="UTF-8">

    <title>OTP Focus: Мобильный прототип v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        otpOrange: '#FE7F32',
                        otpLavender: '#9F6FC3',
                        otpLightBlue: '#C7E1FC',
                        otpDarkBlue: '#8A98A9',
                        otpGreen: '#C1FF04'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']

                    boxShadow: {
                        soft: '0 8px 30px rgba(15, 23, 42, 0.08)'
                    }
                }
            }
        };

    <style>
        body {
            background-color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .scale-wrapper {
            transform: scale(0.85);
            transform-origin: center center;
            transition: transform 0.3s ease;
        }
        @media (max-height: 900px) { .scale-wrapper { transform: scale(0.9); } }
        @media (max-height: 800px) { .scale-wrapper { transform: scale(0.8); } }
        @media (max-height: 700px) { .scale-wrapper { transform: scale(0.72); } }

        .phone-mockup {
            width: 375px;
            height: 812px;
            background: #f8fafc;
            border: 14px solid #0f172a;
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 28px;
            background: #0f172a;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 120;
        }

        .mockup-scroll::-webkit-scrollbar { display: none; }
        .mockup-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-transition { transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1); }

        .slide-panel {
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
        }
        .search-hidden {
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
        }
        .search-visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .sheet-hidden {
            transform: translateY(100%);
            pointer-events: none;
        }
        .sheet-visible {
            transform: translateY(0);
            pointer-events: auto;
        }
        .backdrop-hidden {
            opacity: 0;
            pointer-events: none;
        }
        .backdrop-visible {
            opacity: 1;
            pointer-events: auto;
        }
        .focus-pulse {
            animation: focusPulse 1.8s ease;
        }
        @keyframes focusPulse {
            0% { box-shadow: 0 0 0 0 rgba(254,127,50,0.0); }
            25% { box-shadow: 0 0 0 4px rgba(254,127,50,0.22); }
            55% { box-shadow: 0 0 0 8px rgba(254,127,50,0.14); }
            100% { box-shadow: 0 0 0 0 rgba(254,127,50,0.0); }
        }
    </style>
</head>

        <div class="absolute bottom-0 w-full h-[88px] bg-white border-t border-slate-100 flex justify-center items-start pt-3 pb-8 z-[70]">

</div>

function formatCurrency(value) {
    return new Intl.NumberFormat('ru-RU').format(value) + ' ₽';
}
function formatSignedAmount(value) {
    const abs = Math.abs(value);
    const text = new Intl.NumberFormat('ru-RU').format(abs) + ' ₽';
    return value >= 0 ? '+ ' + text : '- ' + text;
}
function normalize(str) {
    return String(str || '')
        .toLowerCase()
        .replace(/ё/g, 'е')
        .replace(/[^a-zа-я0-9]+/gi, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}
function escapeHtml(str) {
    return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
function getTone(tone) {

function showToast(message) {
    refs.toast.textContent = message;
    refs.toast.classList.remove('opacity-0', 'pointer-events-none');
    refs.toast.classList.add('opacity-100');
    clearTimeout(state.toastTimer);
    state.toastTimer = setTimeout(() => {

        refs.toast.classList.add('opacity-0', 'pointer-events-none');
    }, 1900);
}
function copyText(text, successMessage) {

}

function buildSearchIndex() {
    searchIndex = [];
    showcaseOrder.forEach(key => {
        const category = categoryDefinitions[key];
        searchIndex.push({
            id: `landing-${key}`,
            kind: 'landing',
            category: key,
            section: '',
            title: category.title,
            subtitle: category.subtitle,
            path: `Витрина → ${category.title}`,
            aliases: [category.title, category.subtitle],
            searchGroup: 'product',
            icon: category.icon,
            tone: category.tone
        });
    });
    Object.values(itemCatalog).forEach(item => {
        searchIndex.push({
            ...item,
            kind: item.kind || 'action'
        });
    });
}
function openSearch(prefill = '') {
    closeDetail();
    state.searchOpen = true;
    state.searchQuery = prefill || '';
    refs.searchOverlay.classList.remove('search-hidden');
    refs.searchOverlay.classList.add('search-visible');
    renderSearch();
    setTimeout(() => {
        refs.searchInput.focus();
        refs.searchInput.setSelectionRange(refs.searchInput.value.length, refs.searchInput.value.length);
    }, 60);
}
function closeSearch() {
    state.searchOpen = false;
    refs.searchOverlay.classList.remove('search-visible');
    refs.searchOverlay.classList.add('search-hidden');
}
function addRecentQuery(query) {
    const clean = String(query || '').trim();
    if (!clean) return;
    state.recentSearches = [clean, ...state.recentSearches.filter(item => normalize(item) !== normalize(clean))].slice(0, 4);
}
function searchEntries(query) {
    const q = normalize(query);
    if (!q) return [];
    return searchIndex
        .map(entry => ({ entry, score: getSearchScore(entry, q) }))
        .filter(row => row.score > 0)
        .sort((a, b) => b.score - a.score)
        .map(row => row.entry)
        .slice(0, 12);
}
function getSearchScore(entry, q) {
    const title = normalize(entry.title);
    const subtitle = normalize(entry.subtitle);
    const path = normalize(entry.path);
    const aliases = (entry.aliases || []).map(normalize);
    const hay = [title, subtitle, path, ...aliases].join(' ');
    const tokens = q.split(' ').filter(Boolean);
    const allTokensMatch = tokens.every(token => hay.includes(token));
    if (!hay.includes(q) && !allTokensMatch) return 0;

    let score = 0;
    if (title === q) score += 180;
    if (title.startsWith(q)) score += 120;
    if (aliases.some(alias => alias === q)) score += 110;
    if (hay.includes(q)) score += 55;
    tokens.forEach(token => { if (hay.includes(token)) score += 10; });
    if (entry.searchGroup === 'quick') score += 8;
    if (entry.kind === 'landing') score -= 8;
    return score;
}
function renderSearch() {
    refs.searchInput.value = state.searchQuery;
    const results = searchEntries(state.searchQuery);
    const grouped = {
        quick: results.filter(item => item.searchGroup === 'quick'),
        product: results.filter(item => item.searchGroup === 'product'),
        service: results.filter(item => item.searchGroup === 'service')
    };

    refs.searchScroll.innerHTML = `

                    `).join('')}

            ${state.searchQuery ? renderSearchGroups(grouped) : `
                <div class="bg-white rounded-[28px] p-5 border border-slate-200 shadow-soft">
                    <div class="font-bold text-slate-800">Поиск по действию и намерению</div>

                </div>
            `}
        </div>
    `;
}
function renderSearchGroups(groups) {

            <div class="flex-1 min-w-0">
                <div class="font-bold text-sm text-slate-800">${escapeHtml(result.title)}</div>
                <div class="text-[11px] text-slate-500 mt-1">${escapeHtml(result.subtitle || result.path)}</div>
                <div class="text-[11px] text-otpOrange mt-2 font-semibold">${escapeHtml(result.path)}</div>
            </div>
        </button>
    `;
}
function applySearchQuery(query, addToRecent = false) {
    state.searchQuery = query;
    if (addToRecent) addRecentQuery(query);
    renderSearch();
}
function activateSearchResult(id) {
    const entry = searchIndex.find(item => item.id === id);
    if (!entry) return;
    addRecentQuery(state.searchQuery || entry.title);
    closeSearch();
    if (entry.kind === 'landing') {
        setTab('showcase', true);
        openCategory(entry.category, entry.section || '');
        return;
    }
    if (!entry.category) {
        openDetail(entry.id);
        return;
    }
    routeAction(entry.id, { openDetail: true });
}

/* =========================
   Detail panels
========================= */
function openDetail(id) {
    const item = itemCatalog[id];
    if (!item) return;
    state.activeDetail = id;
    refs.detailContent.innerHTML = renderDetailContent(item);
    refs.backdrop.classList.remove('backdrop-hidden');
    refs.backdrop.classList.add('backdrop-visible');
    refs.detailSheet.classList.remove('sheet-hidden');
    refs.detailSheet.classList.add('sheet-visible');
}
function closeDetail() {
    state.activeDetail = '';
    refs.detailSheet.classList.remove('sheet-visible');
    refs.detailSheet.classList.add('sheet-hidden');
    refs.backdrop.classList.remove('backdrop-visible');
    refs.backdrop.classList.add('backdrop-hidden');
}
function handleDetailButton(type) {
    const item = itemCatalog[state.activeDetail];
    if (!item) return;
    const target = type === 'primary' ? item.primaryTarget : item.secondaryTarget;
    if (target) {
        executeTarget(target);
        return;
    }
    if (item.success) {
        showToast(item.success);
        closeDetail();
        return;
    }
    closeDetail();
}
function handleDirectTarget(target, fallbackMessage) {
    if (target) {
        executeTarget(target);
        return;
    }
    showToast(fallbackMessage || 'Открыто');
}
function executeTarget(target) {
    if (!target) return;
    if (target.startsWith('search:')) {
        closeDetail();
        openSearch(target.replace('search:', ''));
        return;
    }
    if (itemCatalog[target]) {
        const targetItem = itemCatalog[target];
        if (!targetItem.category) {
            openDetail(target);
            return;
        }
        if (state.activeCategory === targetItem.category) {
            openDetail(target);
        } else {
            closeDetail();
            setTimeout(() => routeAction(target, { openDetail: true }), 120);
        }
        return;
    }
    showToast(target);
}
function renderDetailContent(item) {
    const tone = getTone(item.tone);
    return `
        <div class="pb-2">
            <div class="flex items-start justify-between gap-3 mb-4">
                <div class="flex items-start gap-3">
                    <div class="w-12 h-12 rounded-2xl ${tone.soft} flex items-center justify-center text-xl">${escapeHtml(item.icon)}</div>
                    <div>
                        <div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">${escapeHtml(item.path || 'Сервис')}</div>
                        <div class="text-xl font-bold text-slate-800 leading-tight mt-1">${escapeHtml(item.title)}</div>
                        <div class="text-sm text-slate-500 mt-1">${escapeHtml(item.subtitle || '')}</div>
                        ${item.amount ? `<div class="mt-2 text-lg font-bold text-slate-800">${escapeHtml(item.amount)}</div>` : ''}
                    </div>
                </div>
                <button class="w-10 h-10 rounded-2xl bg-slate-100 text-slate-700 text-lg" onclick="closeDetail()">✕</button>
            </div>

            ${item.description ? `<div class="bg-slate-50 rounded-2xl p-4 text-sm text-slate-600 leading-snug mb-4">${escapeHtml(item.description)}</div>` : ''}

            ${renderDetailCustomView(item)}
            ${renderFacts(item)}
            ${renderFields(item)}

            <div class="mt-5 space-y-2">
                <button class="w-full py-3.5 rounded-2xl ${tone.solid} text-sm font-bold" onclick="handleDetailButton('primary')">${escapeHtml(item.primaryLabel || 'Продолжить')}</button>
                ${item.secondaryLabel ? `<button class="w-full py-3.5 rounded-2xl bg-white border border-slate-200 text-sm font-bold text-slate-800" onclick="handleDetailButton('secondary')">${escapeHtml(item.secondaryLabel)}</button>` : ''}
            </div>
        </div>
    `;
}
function renderFacts(item) {
    if (!item.facts || !item.facts.length) return '';
    return `
        <div class="grid grid-cols-2 gap-2 mb-4">
            ${item.facts.map(([label, value]) => `
                <div class="bg-white border border-slate-200 rounded-2xl p-3">
                    <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">${escapeHtml(label)}</div>
                    <div class="text-sm font-semibold text-slate-800 mt-1">${escapeHtml(value)}</div>
                </div>
            `).join('')}
        </div>
    `;
}
function renderFields(item) {
    if (!item.fields || !item.fields.length) return '';
    return `
        <div class="space-y-2 mb-4">
            ${item.fields.map(field => `
                <div class="bg-slate-50 rounded-2xl px-4 py-3 border border-slate-200">
                    <div class="text-[11px] font-bold uppercase tracking-wider text-slate-400">${escapeHtml(field)}</div>
                    <div class="text-sm text-slate-500 mt-1">Заполнится на следующем шаге</div>
                </div>
            `).join('')}
        </div>
    `;
}
function renderDetailCustomView(item) {
    switch (item.customView) {
        case 'cashback':
            return `
                <div class="space-y-2 mb-4">
                    ${[
                        ['АЗС', '10%', 'Топ-категория месяца'],
                        ['Рестораны', '7%', 'До конца месяца'],
                        ['ЖКХ', '5%', 'Для регулярных платежей']
                    ].map(([name, value, text]) => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-3 flex items-center justify-between">
                            <div>
                                <div class="font-bold text-slate-800">${name}</div>
                                <div class="text-[11px] text-slate-500 mt-1">${text}</div>
                            </div>
                            <div class="text-lg font-bold text-otpOrange">${value}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        case 'history':
            return renderOperationsList(true);
        case 'atms':
            return `
                <div class="space-y-2 mb-4">
                    ${[
                        ['Банкомат OTP', 'ул. Льва Толстого, 16', 'Снятие и пополнение'],
                        ['Отделение OTP', 'Ленинградский пр-т, 39', 'Консультации и карты'],
                        ['Партнерский банкомат', 'Тверская, 9', 'Снятие наличных']
                    ].map(([title, address, text]) => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-3">
                            <div class="font-bold text-slate-800">${title}</div>
                            <div class="text-[12px] text-slate-500 mt-1">${address}</div>
                            <div class="text-[11px] font-semibold text-otpOrange mt-2">${text}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        case 'qr':
            return `
                <div class="mb-4 text-center">
                    <div class="w-48 h-48 mx-auto bg-slate-100 rounded-[28px] border-2 border-dashed border-otpLavender flex items-center justify-center relative overflow-hidden">
                        <div class="absolute inset-4 border-2 border-otpLightBlue opacity-60 rounded-[18px]"></div>
                        <div class="text-5xl">📷</div>
                    </div>
                    <div class="text-[12px] text-slate-500 mt-3">Наведите камеру на QR-код для оплаты через СБП.</div>
                </div>
            `;
        case 'depositCalculator':
            return `
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-3">
                        <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">Сумма</div>
                        <div class="font-bold text-slate-800 mt-1">100 000 ₽</div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-3">
                        <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">Срок</div>
                        <div class="font-bold text-slate-800 mt-1">6 мес.</div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-3">
                        <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">Доход</div>
                        <div class="font-bold text-otpOrange mt-1">7 100 ₽</div>
                    </div>
                </div>
            `;
        case 'loanSchedule':
            return `
                <div class="space-y-2 mb-4">
                    ${[
                        ['25 марта', '12 840 ₽', 'Ежемесячный платеж'],
                        ['25 апреля', '12 840 ₽', 'Ежемесячный платеж'],
                        ['25 мая', '12 840 ₽', 'Ежемесячный платеж']
                    ].map(([date, amount, note]) => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-3 flex items-center justify-between">
                            <div>
                                <div class="font-bold text-slate-800">${date}</div>
                                <div class="text-[11px] text-slate-500 mt-1">${note}</div>
                            </div>
                            <div class="font-bold text-slate-800">${amount}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        case 'currency':
            return `
                <div class="space-y-2 mb-4">
                    ${appData.investments.rates.map(rate => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-3 flex items-center justify-between">
                            <div class="font-bold text-slate-800">${escapeHtml(rate.code)}</div>
                            <div class="text-right">
                                <div class="text-[11px] text-slate-500">Покупка ${escapeHtml(rate.buy)}</div>
                                <div class="text-[11px] text-slate-500">Продажа ${escapeHtml(rate.sell)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        case 'calendar':
            return `
                <div class="space-y-2 mb-4">
                    ${[
                        ['18 марта', 'Отчетность крупнейших эмитентов', 'Следите за волатильностью'],
                        ['22 марта', 'Купонные выплаты по облигациям', 'Доход по фиксированным инструментам'],
                        ['28 марта', 'Закрытие реестров по дивидендам', 'Проверьте наблюдение']
                    ].map(([date, title, text]) => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-3">
                            <div class="text-[11px] font-bold uppercase tracking-wider text-slate-400">${date}</div>
                            <div class="font-bold text-slate-800 mt-1">${title}</div>
                            <div class="text-[11px] text-slate-500 mt-1">${text}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        case 'investNews':
            return `
                <div class="space-y-2 mb-4">
                    ${appData.investments.news.map(headline => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-3">
                            <div class="font-semibold text-slate-800 leading-snug">${escapeHtml(headline)}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        case 'reports':
            if (item.category === 'investments') {
                return `
                    <div class="space-y-2 mb-4">
                        ${[
                            ['Облигации для консервативного сценария', 'Подборка выпусков с умеренным риском'],
                            ['Акции дивидендного профиля', 'Компании со стабильными выплатами']
                        ].map(([title, note]) => `
                            <div class="bg-white border border-slate-200 rounded-2xl p-3">
                                <div class="font-bold text-slate-800">${title}</div>
                                <div class="text-[11px] text-slate-500 mt-1">${note}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            return `
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-3">
                        <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">Этот месяц</div>
                        <div class="font-bold text-slate-800 mt-1">58 640 ₽</div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-3">
                        <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">Изменение</div>
                        <div class="font-bold text-otpOrange mt-1">+8%</div>
                    </div>
                </div>
            `;
        case 'repeat':
            return renderOperationsList(false, true);
        case 'spendingCategories':
            return `
                <div class="space-y-2 mb-4">
                    ${appData.spendingCategories.map(cat => {
                        const percent = Math.min(100, Math.round((cat.amount / cat.limit) * 100));
                        return `
                            <div class="bg-white border border-slate-200 rounded-2xl p-3">
                                <div class="flex items-center justify-between">
                                    <div class="font-bold text-slate-800">${escapeHtml(cat.icon)} ${escapeHtml(cat.title)}</div>
                                    <div class="text-sm font-semibold text-slate-800">${formatCurrency(cat.amount)}</div>
                                </div>
                                <div class="mt-2 w-full h-2 rounded-full bg-slate-100 overflow-hidden">
                                    <div class="h-full bg-otpOrange" style="width:${percent}%"></div>
                                </div>
                                <div class="mt-2 text-[11px] text-slate-500">Лимит ${formatCurrency(cat.limit)}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        case 'limits':
            return `
                <div class="space-y-2 mb-4">
                    ${appData.spendingCategories.slice(0, 4).map(cat => {
                        const percent = Math.min(100, Math.round((cat.amount / cat.limit) * 100));
                        return `
                            <div class="bg-white border border-slate-200 rounded-2xl p-3">
                                <div class="flex items-center justify-between">
                                    <div class="font-bold text-slate-800">${escapeHtml(cat.title)}</div>
                                    <div class="text-[11px] font-semibold ${percent > 80 ? 'text-otpOrange' : 'text-slate-600'}">${percent}% лимита</div>
                                </div>
                                <div class="mt-2 w-full h-2 rounded-full bg-slate-100 overflow-hidden">
                                    <div class="h-full ${percent > 80 ? 'bg-otpOrange' : 'bg-slate-800'}" style="width:${percent}%"></div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        default:
            return '';
    }
}
function renderOperationsList(withDates = true, withRepeatAction = false) {
    return `
        <div class="space-y-2 mb-4">
            ${appData.recentOperations.map(op => `
                <div class="bg-white border border-slate-200 rounded-2xl p-3 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center text-lg">${escapeHtml(op.icon)}</div>
                    <div class="flex-1">
                        <div class="font-bold text-slate-800 text-sm">${escapeHtml(op.title)}</div>
                        <div class="text-[11px] text-slate-500 mt-1">${escapeHtml(op.category)}${withDates ? ' • ' + escapeHtml(op.dateLabel) : ''}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-sm ${op.amount >= 0 ? 'text-green-600' : 'text-slate-800'}">${formatSignedAmount(op.amount)}</div>
                        ${withRepeatAction ? `<button class="mt-1 text-[11px] font-semibold text-otpOrange" onclick="showToast('Операция готова к повтору')">Повторить</button>` : ''}
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

/* =========================
   Navigation logic
========================= */
function setTab(tabName, preserveCategory = false) {
    closeSearch();
    closeDetail();

    state.tab = tabName;
    if (!preserveCategory) closeCategory(true);

    if (tabName === 'home') {
        refs.home.classList.remove('opacity-0', 'pointer-events-none');
        refs.home.classList.add('opacity-100', 'z-10');
        refs.showcase.classList.remove('opacity-100', 'z-10');
        refs.showcase.classList.add('opacity-0', 'pointer-events-none', 'z-0');
    } else {
        refs.showcase.classList.remove('opacity-0', 'pointer-events-none');
        refs.showcase.classList.add('opacity-100', 'z-10');
        refs.home.classList.remove('opacity-100', 'z-10');
        refs.home.classList.add('opacity-0', 'pointer-events-none', 'z-0');
    }
    updateNav();
}
function updateNav() {
    const homeActive = state.tab === 'home';
    refs.navHome.classList.toggle('text-otpOrange', homeActive);
    refs.navHome.classList.toggle('text-otpDarkBlue', !homeActive);
    refs.navShowcase.classList.toggle('text-otpOrange', !homeActive);
    refs.navShowcase.classList.toggle('text-otpDarkBlue', homeActive);
}
function quickHomeAction(type) {
    setTab('showcase', true);
    if (type === 'transfer') {
        openCategory('payments', 'transfer');
        return;
    }
    if (type === 'pay') {
        openCategory('payments', 'pay');
        return;
    }
    if (type === 'sbp') {
        routeAction('pay-qr', { openDetail: true });
        return;
    }
    if (type === 'history') {
        routeAction('spend-history', { openDetail: true });
    }
}
function routeAction(itemId, options = {}) {
    const item = itemCatalog[itemId];
    if (!item) return;
    if (!item.category) {
        openDetail(itemId);
        return;
    }
    setTab('showcase', true);
    openCategory(item.category, options.section || item.section || '');
    clearTimeout(state.detailTimer);
    if (options.openDetail !== false) {
        state.detailTimer = setTimeout(() => openDetail(itemId), 320);
    }
}

/* =========================
   Init
========================= */
function setupSearchInput() {
    refs.searchInput.addEventListener('input', (event) => {
        state.searchQuery = event.target.value;
        renderSearch();
    });
    refs.searchInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            addRecentQuery(state.searchQuery);
            renderSearch();
        }
    });
}
function init() {
    buildSearchIndex();
    renderHome();
    renderShowcase();
    setupSearchInput();
    setTab('home');
}
init();
</script>
